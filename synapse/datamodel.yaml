    type: [guid, {}]
    doc: A developer selected label.
    props:
      id:
        type: ['meta:id', {}]
        doc: The ID of the label.
      title:
        type: ['str:lower', {}]
        doc: The human friendly name of the label.
      desc:
        type: [text, {}]
        doc: The description of the label.
