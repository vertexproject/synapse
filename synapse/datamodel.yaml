    - ['entity:actor', {}]
    props: {}
  taxon:
    type: [null, {ctor: synapse.lib.types.Taxon}]
    doc: A component of a hierarchical taxonomy.
  taxonomy:
    type: [null, {ctor: synapse.lib.types.Taxonomy}]
    doc: A hierarchical taxonomy.
  tel:call:
    type: [guid, {}]
