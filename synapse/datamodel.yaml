        doc: The serial number within the IMEI.
  tel:mob:imid:
    type: [comp, {fields: [[imei, 'tel:mob:imei'], [imsi, 'tel:mob:imsi']]}]
    doc: Fused knowledge of an IMEI/IMSI used together.
