      imsi:
        type: ['tel:mob:imsi', {}]
        computed: true
        doc: The IMSI for the phone subscriber.
  tel:mob:imsi:
    type: [null, {ctor: synapse.models.telco.Imsi}]
    doc: An International Mobile Subscriber Id.
    ex: '310150123456789'
    interfaces:
    - ['meta:observable', {template: {title: IMSI}}]
    props:
      mcc:
        type: ['tel:mob:mcc', {}]
        computed: true
        doc: The Mobile Country Code.
  tel:mob:imsiphone:
    type: [comp, {fields: [[imsi, 'tel:mob:imsi'], [phone, 'tel:phone']]}]
