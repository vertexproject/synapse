      form:
        type: ['syn:form', {}]
        doc: The form of the property.
        computed: true
      type:
        type: ['syn:type', {}]
        doc: The synapse type for this property.
        computed: true
      relname:
        type: [str, {}]
        doc: Relative property name.
        computed: true
      univ:
        type: [bool, {}]
        doc: Specifies if a prop is universal.
        computed: true
      base:
        type: [str, {}]
        doc: Base name of the property.
        computed: true
      computed:
        type: [bool, {}]
        doc: If the property is dynamically computed from other property values.
        computed: true
      extmodel:
        type: [bool, {}]
        doc: If the property is an extended model property or not.
        computed: true
  syn:role:
    type: [null, {ctor: synapse.models.syn.SynRole}]
