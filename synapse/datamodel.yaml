      radio:
        type: ['tel:mob:cell:radio:type:taxonomy', {}]
        doc: Cell radio type.
  tel:mob:cell:radio:type:taxonomy:
    type: [taxonomy, {}]
    doc: A hierarchical taxonomy of cell radio types.
    interfaces:
    - ['meta:taxonomy', {}]
    props: {}
  tel:mob:imei:
    type: [null, {ctor: synapse.models.telco.Imei}]
