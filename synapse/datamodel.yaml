      received:from:fqdn:
        type: ['inet:fqdn', {}]
        doc: 'The sending server FQDN, potentially from the Received: header.'
      flow:
        type: ['inet:flow', {}]
        doc: The inet:flow which delivered the message.
      links:
        type: [array, {type: 'inet:hyperlink'}]
