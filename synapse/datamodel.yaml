        type: ['inet:url', {}]
        computed: true
        doc: The original/source URL before redirect.
      target:
        type: ['inet:url', {}]
        computed: true
        doc: The redirected/destination URL.
  inet:urlfile:
    type: [comp, {fields: [[url, 'inet:url'], [file, 'file:bytes']]}]
    doc: A file hosted at a specific Universal Resource Locator (URL).
    interfaces:
    - ['meta:observable', {template: {title: hosted file and URL}}]
    props:
      url:
        type: ['inet:url', {}]
        computed: true
        doc: The URL where the file was hosted.
      file:
        type: ['file:bytes', {}]
        computed: true
        doc: The file that was hosted at the URL.
  inet:user:
    type: [str, {lower: true}]
    doc: A username string.
    interfaces:
    - ['meta:observable', {template: {title: username}}]
    props: {}
  inet:whois:ipquery:
    type: [guid, {}]
    doc: Query details used to retrieve an IP record.
    props:
      time:
        type: [time, {}]
        doc: The time the request was made.
      url:
        type: ['inet:url', {}]
        doc: The query URL when using the HTTP RDAP Protocol.
      fqdn:
        type: ['inet:fqdn', {}]
        doc: The FQDN of the host server when using the legacy WHOIS Protocol.
      ip:
        type: ['inet:ip', {}]
        doc: The IP address queried.
        prevnames: [ipv4, ipv6]
      success:
        type: [bool, {}]
        doc: Whether the host returned a valid response for the query.
      rec:
        type: ['inet:whois:iprecord', {}]
        doc: The resulting record from the query.
  inet:whois:iprecord:
    type: [guid, {}]
    doc: An IPv4/IPv6 block registration record.
    interfaces:
    - ['meta:observable', {template: {title: registration record}}]
    props:
      net:
        type: ['inet:net', {}]
        prevnames: [net4, net6]
        doc: The IP address range assigned.
      desc:
        type: [text, {}]
        doc: The description of the network from the whois record.
      created:
        type: [time, {}]
        doc: The "created" time from the record.
      updated:
        type: [time, {}]
        doc: The "last updated" time from the record.
      text:
        type: ['text:lower', {}]
        doc: The full text of the record.
      asn:
        type: ['inet:asn', {}]
        doc: The associated Autonomous System Number (ASN).
      id:
        type: ['meta:id', {}]
        doc: The registry unique identifier (e.g. NET-74-0-0-0-1).
      parentid:
        type: ['meta:id', {}]
        doc: The registry unique identifier of the parent whois record (e.g. NET-74-0-0-0-0).
      name:
        type: ['meta:id', {}]
        doc: The name ID assigned to the network by the registrant.
      country:
        type: ['iso:3166:alpha2', {}]
        doc: The ISO 3166 Alpha-2 country code.
      status:
        type: ['str:lower', {}]
        doc: The state of the registered network.
      type:
        type: ['str:lower', {}]
        doc: The classification of the registered network (e.g. direct allocation).
      links:
        type: [array, {type: 'inet:url'}]
        doc: URLs provided with the record.
      contacts:
        type: [array, {type: 'entity:contact'}]
        doc: The whois registration contacts.
  inet:whois:record:
    type: [guid, {}]
    doc: An FQDN whois registration record.
    interfaces:
    - ['meta:observable', {template: {title: registration record}}]
    prevnames: ['inet:whois:rec']
    props:
      fqdn:
        type: ['inet:fqdn', {}]
        doc: The domain associated with the whois record.
      text:
        type: ['text:lower', {}]
        doc: The full text of the whois record.
      created:
        type: [time, {}]
        doc: The "created" time from the whois record.
      updated:
        type: [time, {}]
        doc: The "last updated" time from the whois record.
      expires:
        type: [time, {}]
        doc: The "expires" time from the whois record.
      registrar:
        type: ['entity:name', {}]
        doc: The registrar name from the whois record.
      registrant:
        type: ['entity:name', {}]
        doc: The registrant name from the whois record.
      contacts:
        type: [array, {type: 'entity:contact'}]
        doc: The whois registration contacts.
      nameservers:
        type: [array, {type: 'inet:fqdn', uniq: false, sorted: false}]
        doc: The DNS nameserver FQDNs for the registered FQDN.
  inet:wifi:ap:
    type: [guid, {}]
    doc: An SSID/MAC address combination for a wireless access point.
    interfaces:
    - ['meta:havable', {}]
    - ['geo:locatable', {}]
    - ['meta:observable', {}]
    template:
      title: Wi-Fi access point
    props:
      ssid:
        type: ['inet:wifi:ssid', {}]
        doc: The SSID for the wireless access point.
        computed: true
      bssid:
        type: ['inet:mac', {}]
        doc: The MAC address for the wireless access point.
        computed: true
      channel:
        type: [int, {}]
        doc: The WIFI channel that the AP was last observed operating on.
      encryption:
        type: ['base:name', {}]
        doc: The type of encryption used by the WIFI AP such as "wpa2".
  inet:wifi:ssid:
    type: [str, {strip: false}]
    doc: A Wi-Fi service set identifier (SSID) name.
    ex: The Vertex Project
    interfaces:
    - ['meta:observable', {}]
    template:
      title: Wi-Fi SSID
    props: {}
  int:
    type: [null, {ctor: synapse.lib.types.Int}]
    doc: The base 64 bit signed integer type.
  int:min0:
    type: [int, {min: 0}]
    doc: A non-negative integer.
  int:min1:
    type: [int, {min: 1}]
    doc: A positive integer.
  iso:3166:alpha2:
    type: [str, {lower: true, regex: '^[a-z0-9]{2}$'}]
    doc: An ISO 3166 Alpha-2 country code.
    ex: us
    prevnames: ['pol:iso2', 'iso:3166:cc']
    props: {}
  iso:3166:alpha3:
    type: [str, {lower: true, regex: '^[a-z0-9]{3}$'}]
    doc: An ISO 3166 Alpha-3 country code.
    ex: usa
    prevnames: ['pol:iso3']
    props: {}
  iso:3166:numeric3:
    type: [str, {regex: '^[0-9]{3}$'}]
    doc: An ISO 3166 Numeric-3 country code.
    ex: '840'
    prevnames: ['pol:isonum']
    props: {}
  iso:oid:
    type: [str, {regex: '^([0-2])((\.0)|(\.[1-9][0-9]*))*$'}]
    doc: An ISO Object Identifier string.
    props:
      desc:
        type: [str, {}]
        doc: A description of the value or meaning of the OID.
      identifier:
        type: [str, {}]
        doc: The string identifier for the deepest tree element.
  it:adid:
    type: ['meta:id', {}]
    doc: An advertising identification string.
    interfaces:
    - ['entity:identifier', {}]
    - ['meta:observable', {template: {title: advertising ID}}]
    props: {}
  it:app:snort:match:
    type: [guid, {}]
    doc: An instance of a snort rule hit.
    interfaces:
    - ['meta:matchish', {template: {rule: Snort rule, 'rule:type': 'it:app:snort:rule', 'target:type': 'inet:flow'}}]
    prevnames: ['it:app:snort:hit']
    props:
      sensor:
        type: ['it:host', {}]
        doc: The sensor host node that produced the match.
      dropped:
        type: [bool, {}]
        doc: Set to true if the network traffic was dropped due to the match.
  it:app:snort:rule:
    type: ['meta:rule', {}]
    doc: A snort rule.
    interfaces:
    - ['doc:authorable', {}]
    template:
      title: snort rule
      syntax: ''
    props:
      engine:
        type: [int, {}]
        doc: The snort engine ID which can parse and evaluate the rule text.
  it:app:yara:match:
    type: [guid, {}]
    doc: A YARA rule which can match files, processes, or network traffic.
    interfaces:
    - ['meta:matchish', {template: {rule: YARA rule, 'rule:type': 'it:app:yara:rule', 'target:type': 'it:app:yara:target'}}]
    props: {}
  it:app:yara:rule:
    type: ['meta:rule', {}]
    doc: A YARA rule unique identifier.
    interfaces:
    - ['doc:authorable', {}]
    template:
      title: YARA rule
      syntax: yara
    props: {}
  it:app:yara:target:
    type:
    - ['file:bytes', {}]
    - ['it:exec:proc', {}]
    - ['inet:ip', {}]
    - ['inet:fqdn', {}]
    - ['inet:url', {}]
    doc: An type which is limited to forms which YARA rules can match.
  it:av:pattern:type:
    type: [str, {lower: true, enums: 'stix,pcre,sigma,snort,suricata,yara'}]
    doc: An antivirus signature pattern type.
  it:av:scan:result:
    type: [guid, {}]
    doc: The result of running an antivirus scanner.
    props:
      time:
        type: [time, {}]
        doc: The time the scan was run.
      verdict:
        type: ['it:av:verdict', {}]
        doc: The scanner provided verdict for the scan.
      scanner:
        type: ['it:software', {}]
        doc: The scanner software used to produce the result.
      scanner:name:
        type: ['it:softwarename', {}]
        doc: The name of the scanner software.
      signame:
        type: ['it:av:signame', {}]
        doc: The name of the signature returned by the scanner.
      categories:
        type: [array, {type: 'base:name'}]
        doc: A list of categories for the result returned by the scanner.
      target:
        type:
        - ['file:bytes', {}]
        - ['it:exec:proc', {}]
        - ['it:host', {}]
        - ['inet:fqdn', {}]
        - ['inet:url', {}]
        - ['inet:ip', {}]
        doc: The target of the scan.
      multi:scan:
        type: ['it:av:scan:result', {}]
        doc: Set if this result was part of running multiple scanners.
      multi:count:
        type: [int, {min: 0}]
        doc: The total number of scanners which were run by a multi-scanner.
      multi:count:benign:
        type: [int, {min: 0}]
        doc: The number of scanners which returned a benign verdict.
      multi:count:unknown:
        type: [int, {min: 0}]
        doc: The number of scanners which returned a unknown/unsupported verdict.
      multi:count:suspicious:
        type: [int, {min: 0}]
        doc: The number of scanners which returned a suspicious verdict.
      multi:count:malicious:
        type: [int, {min: 0}]
        doc: The number of scanners which returned a malicious verdict.
  it:av:signame:
    type: ['base:name', {}]
    doc: An antivirus signature name.
    props: {}
  it:av:verdict:
    type: [int, {enums: *suslevels}]
    doc: An antivirus scan verdict.
  it:cmd:
    type: [str, {}]
    doc: A unique command-line string.
    ex: foo.exe --dostuff bar
    props: {}
