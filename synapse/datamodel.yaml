      depth:
        type: [int, {}]
        computed: true
        doc: How deep the tag is in the hierarchy.
      title:
        type: [str, {}]
        doc: A display title for the tag.
      base:
        type: [str, {}]
        computed: true
        doc: The tag base name. Eg baz for foo.bar.baz .
  syn:tag:part:
    type: [null, {ctor: synapse.lib.types.TagPart}]
    doc: A tag component string.
  syn:tagprop:
    type: [str, {}]
