    - ['entity:identifier', {}]
    props:
      mcc:
        type: ['tel:mob:mcc', {}]
        doc: The Mobile Country Code.
      mnc:
        type: ['tel:mob:mnc', {}]
        doc: The Mobile Network Code.
  tel:mob:cell:
    type: [guid, {}]
    doc: A mobile cell site which a phone may connect to.
    interfaces:
    - ['geo:locatable', {template: {title: cell tower}}]
    props:
      carrier:
        type: ['tel:mob:carrier', {}]
