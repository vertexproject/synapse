    props:
      name:
        type: ['inet:email:header:name', {}]
        computed: true
        doc: The name of the email header.
      value:
        type: [str, {}]
        computed: true
        doc: The value of the email header.
  inet:email:header:name:
    type: [str, {lower: true}]
    doc: An email header name.
