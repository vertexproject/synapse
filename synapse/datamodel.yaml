      cc:
        type: [array, {type: 'inet:email'}]
        doc: Email addresses parsed from the "cc" header.
      subject:
        type: [str, {}]
        doc: The email message subject parsed from the "subject" header.
      body:
        type: [text, {}]
        doc: The body of the email message.
      date:
