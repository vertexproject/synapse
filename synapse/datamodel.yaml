      path:
        type: ['file:path', {}]
        doc: The path where the file was created.
      file:
        type: ['file:bytes', {}]
        doc: The file that was created.
      sandbox:file:
        type: ['file:bytes', {}]
        doc: The initial sample given to a sandbox environment to analyze.
