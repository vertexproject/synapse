types:
  array:
    type: [null, {ctor: synapse.lib.types.Array, type: int}]
    doc: A typed array which indexes each field.
    virts:
      size:
        type: [int, {}]
        computed: true
        doc: The number of elements in the array.
  auth:passwd:
    type: [null, {ctor: synapse.models.auth.Passwd, strip: false}]
    doc: A password string.
    interfaces:
    - ['auth:credential', {}]
    - ['crypto:hashable', {}]
    - ['meta:observable', {template: {title: password}}]
    props:
      md5:
        type: ['crypto:hash:md5', {}]
        computed: true
        doc: The MD5 hash of the password.
      sha1:
        type: ['crypto:hash:sha1', {}]
        computed: true
        doc: The SHA1 hash of the password.
      sha256:
        type: ['crypto:hash:sha256', {}]
        computed: true
        doc: The SHA256 hash of the password.
  base:id:
    type: [str, {}]
    doc: A base type for ID strings.
  base:name:
    type: [str, {onespace: true, lower: true}]
    doc: A base type for case insensitive names.
  belief:subscriber:
    type: [guid, {}]
    doc: A contact which subscribes to a belief system.
  belief:system:
    type: [guid, {}]
    doc: A belief system such as an ideology, philosophy, or religion.
    interfaces:
    - ['meta:believable', {}]
    props:
      name:
        type: ['meta:name', {}]
        doc: The name of the belief system.
      desc:
        type: [text, {}]
        doc: A description of the belief system.
      type:
