      period:
        type: [ival, {}]
        doc: The time period when the call took place.
      connected:
        type: [bool, {}]
        doc: Indicator of whether the call was connected.
  tel:mob:carrier:
    type: [guid, {}]
    doc: The fusion of a MCC/MNC.
