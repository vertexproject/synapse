desc: Added a compiled binary format (stormbin) for Storm queries that enables pre-compiled
  queries to skip parsing. Compiled queries are accepted anywhere a Storm query string
  is accepted, including the HTTP API via ``}`` prefix encoding. Added ``--compiled``
  option to ``synapse.tools.storm.pkg.gen`` (genpkg) to pre-compile Storm queries when
  building storm packages.
