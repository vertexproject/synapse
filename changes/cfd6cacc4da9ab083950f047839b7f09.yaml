---
desc: |
  - The ``synapse.common.setlogging()`` and ``synapse.common.normLogLevel()``
    functions have been removed. Callers should migrate to the new
    ``synapse.lib.logging`` module:

    - Replace ``s_common.setlogging(logger, defval=level, structlog=True)`` with
      ``s_logging.setup()`` (reads ``SYN_LOG_LEVEL`` / ``SYN_LOG_STRUCT`` from
      the environment automatically).
    - Replace ``s_common.normLogLevel(valu)`` with
      ``s_logging.normLogLevel(valu)``.
    - Replace the ``{'synapse': {...}}`` extra dict envelope with
      ``s_logging.getLogExtra(**kwargs)``.
    - ``Cell.getLogExtra()`` is now a synchronous method (previously ``async``);
      remove any ``await`` at call sites.
    - ``Cell._getSpawnLogConf()`` has been removed; use ``Cell.getLogConf()``
      (synchronous) instead.
    - The ``log_conf`` keyword argument to ``synapse.lib.process.spawn()`` has
      been renamed to ``logconf``.
