desc: 'Migrated invalid inet:client, inet:server, and inet:url nodes. For all three
  forms, the canonical representation of IPv6 addresses requires the address to be
  enclosed in square brackets (``[`` and ``]``) in URIs.  During migration, if a non-canonical
  node is migrated to a canonical node, the migration will attempt to merge the properties,
  tags, tagprops, and nodedata of the two nodes. The merge strategy is as follows:

    - If the item being merged is the same in both nodes or the non-canonical
      node does not have the item set, the canonical node value stays the same.
    - If the item being merged is different in both nodes, the canonical value
      takes precedence and the non-canonical value will be saved in
      nodedata under the ``model_0_2_35`` key.
    - If the canonical node does not have the item and the non-canonical node
      does, the non-canonical value is used.
    - ``.seen`` props and tag values will be expanded using normal ival
      expansion rules.
'
