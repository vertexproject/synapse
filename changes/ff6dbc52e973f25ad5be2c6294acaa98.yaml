desc: |
  - The test helper classes ``StreamEvent`` and ``AsyncStreamEvent`` and the
    context manager methods ``getAsyncLoggerStream()`` and
    ``getStructuredAsyncLoggerStream()`` have been removed from
    ``synapse.tests.utils``. All three helpers are consolidated into a single
    ``getLoggerStream(name, struct=True)`` context manager that returns a
    ``LoggerStream`` object.

    ``LoggerStream`` captures log output as JSON lines by default
    (``struct=True``). It exposes an async
    ``expect(text, count=1, timeout=6, escape=True)`` coroutine that waits for a
    pattern to appear in the captured output and raises ``AssertionError`` on
    timeout. Its ``jsonlines()`` method parses captured output as a list of
    dicts.

    Migration guide:

    **Before (using ``getLoggerStream``):**

    .. code-block:: python
  
        with self.getLoggerStream('synapse.lib.cell', 'some message') as stream:
            doSomething()
            stream.wait(timeout=10)
        stream.seek(0)
        stream.expect('some message')

    **After:**

    .. code-block:: python

        with self.getLoggerStream('synapse.lib.cell') as stream:
            await doSomething()
            await stream.expect('some message', timeout=10)

    **Before (using ``getAsyncLoggerStream``):**

    .. code-block:: python

        name = 'synapse.lib.cell'
        with self.getAsyncLoggerStream(name, 'some message') as stream:
            await doSomething()
            await stream.wait(timeout=10)
        stream.seek(0)
        mesgs = stream.read()

    **After:**

    .. code-block:: python

        with self.getLoggerStream('synapse.lib.cell') as stream:
            await doSomething()
            await stream.expect('some message', timeout=10)

    **Before (using ``getStructuredAsyncLoggerStream``):**

    .. code-block:: python

        name = 'synapse.lib.cell'
        with self.getStructuredAsyncLoggerStream(name, '"key"') as stream:
            await doSomething()
            await stream.wait(timeout=10)
        msgs = stream.jsonlines()

    **After (** ``struct=True`` **by default):**

    .. code-block:: python

        with self.getLoggerStream('synapse.lib.cell') as stream:
            await doSomething()
            await stream.expect('"key"', timeout=10)
        msgs = stream.jsonlines()

    Tests that previously used the synchronous ``stream.expect()`` or
    ``stream.noexpect()`` should be updated to use ``await stream.expect()`` or
    ``self.notin(text, stream.getvalue())``.
